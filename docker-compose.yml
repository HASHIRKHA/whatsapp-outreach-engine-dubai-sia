version: '3.9'

networks:
  internal:
    driver: bridge

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # REDIS_PASSWORD must be set in .env — empty string disables auth (not recommended in production).
    command: >
      redis-server
      --appendonly yes
      --requirepass "${REDIS_PASSWORD:-changeme_in_production}"
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', "${REDIS_PASSWORD:-changeme_in_production}", 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Applications ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme_in_production}@redis:6379"
      NODE_ENV: production
      PORT: '3001'
    volumes:
      # Persists media uploads across container restarts/redeploys — matches
      # UPLOAD_DIR default ('uploads', resolved relative to the container's cwd).
      - uploads_data:/app/apps/api/uploads
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    # envsubst substitutes ${DOMAIN} in the config template before nginx starts.
    # $$DOMAIN escapes the dollar sign so the shell sees $DOMAIN at runtime.
    entrypoint: ["/bin/sh", "-c", "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"]
    environment:
      DOMAIN: "${DOMAIN}"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - '80:80'
      - '443:443'
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  redis_data:
  uploads_data:
